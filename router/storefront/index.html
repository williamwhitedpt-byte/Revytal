<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storefront — Revytal</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>

  <nav class="nav">
    <a class="nav-logo" href="../index.html">
      <div class="nav-logo-mark"><span>R</span></div>
      Revytal
    </a>
    <span class="nav-badge">Clinical Storefront</span>
  </nav>

  <div class="page">

    <div class="page-header">
      <h1>Product Catalog</h1>
      <p>Search and recommend clinical-grade products. Recommendations route automatically.</p>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="#A0A0A0" stroke-width="1.3"/>
        <path d="M11 11l3 3" stroke="#A0A0A0" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <input
        id="search-input"
        class="search-input"
        type="text"
        placeholder="Search by name, category, or condition…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div id="product-grid" class="product-grid">
      <!-- Products injected by storefront.js -->
      <div class="empty-state"><p>Loading products…</p></div>
    </div>

  </div>

  <footer class="footer">
    <span class="footer-copy">© 2025 Revytal · All routes via affiliate link in v0.1</span>
    <div class="footer-links">
      <a href="../index.html">Home</a>
      <a href="../checkout/">Checkout</a>
    </div>
  </footer>

  <!-- Router must load before storefront -->
  <script src="../router/router.js"></script>
  <script src="storefront.js"></script>

</body>
</html>
